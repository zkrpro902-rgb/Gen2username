<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Username Checker - Clone</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #5865f2;
            --text-gray: #b9bbbe;
            --danger: #ed4245;
            --success: #3ba55d;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header { margin-bottom: 20px; font-weight: bold; font-size: 20px; }

        .main-layout {
            display: grid;
            grid-template-columns: 500px 300px;
            gap: 20px;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
        }

        /* Grille de boutons */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: #2b2d31;
            border: 1px solid #3f4147;
            color: var(--text-gray);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button.active { background: white; color: black; }

        .input-group { margin-bottom: 10px; display: flex; gap: 5px; }
        input {
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            flex-grow: 1;
            border-radius: 4px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .stat-box { font-size: 18px; font-weight: bold; }
        .stat-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; }

        /* Live Checking Area */
        .live-check {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 150px;
            background: #111;
            border-radius: 8px;
        }
        .current-name { color: var(--danger); font-size: 32px; font-weight: bold; letter-spacing: 2px; }

        .start-btn { background: #333; width: 48%; margin-top: 20px; font-weight: bold; }
        .stop-btn { background: #333; width: 48%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">Discord Username Checker</div>

    <div class="main-layout">
        <div>
            <div class="panel">
                <div class="input-group">
                    <input type="text" placeholder="Proxy URL">
                    <button>Save</button>
                </div>
                <div class="input-group">
                    <input type="text" value="https://canary.discord.com/api/webhooks/...">
                    <button>Save</button>
                </div>

                <div class="btn-grid">
                    <button>4C</button><button>4L</button><button>Semi 3L</button>
                    <button>4N</button><button>Semi 4N</button><button>Semi 3C</button>
                    <button class="active">4L Repeater</button><button>Bad Semi 3L</button><button>Bad Semi 3C</button>
                </div>

                <div style="margin-top:15px; font-size: 12px;">
                    <input type="checkbox" checked> Random
                </div>

                <div style="display: flex; justify-content: space-between;">
                    <button class="start-btn">START</button>
                    <button class="stop-btn">STOP</button>
                </div>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                    <span style="background:var(--success); padding: 2px 5px; border-radius: 3px;">CHECKING</span>
                    <span>100%</span>
                </div>
                <div style="height: 4px; background: #333; border-radius: 2px;">
                    <div style="width: 100%; height: 100%; background: white;"></div>
                </div>

                <div class="stats-container">
                    <div class="stat-box">46525<div class="stat-label">Checked</div></div>
                    <div class="stat-box" style="color:var(--success)">0<div class="stat-label">Available</div></div>
                    <div class="stat-box">46525<div class="stat-label">Taken</div></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="stat-label" style="margin-bottom: 10px;">Live Checking</div>
            <div class="live-check">
                <div class="current-name" id="display-name">elbb</div>
                <div style="font-size: 10px; color: var(--text-gray); margin-top: 10px;">TAKEN</div>
            </div>
        </div>
    </div>

    <script>
        // Petite animation pour simuler le scan
        const display = document.getElementById('display-name');
        const chars = 'abcdefghijklmnopqrstuvwxyz';
        
        setInterval(() => {
            let res = '';
            for(let i=0; i<4; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            display.innerText = res;
        }, 500);
    </script>
</body>
</html>
